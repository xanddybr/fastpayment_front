<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FastPayment | Mistura de Luz</title>
  </head>
  <body class="bg-black text-slate-200 min-h-screen">
    <div id="app" class="min-h-screen p-4 md:p-8">
      <main class="w-full max-w-6xl mx-auto">
        
        <section id="login" class="hidden max-w-md mx-auto bg-white p-8 rounded-3xl shadow-2xl border border-slate-100 space-y-6 my-8">
          <div class="text-center">
            <div class="flex justify-center">
                <img src="/images/logo.png" alt="Logo" class="h-32 w-auto object-contain">
            </div>
            <p class="text-slate-500 mt-2 italic">Painel de Controle Administrativo</p>
          </div>
          <div class="space-y-4">
            <input type="email" id="admin-email" placeholder="E-mail" class="w-full border rounded-xl p-3 text-slate-900 focus:ring-2 focus:ring-blue-500 outline-none">
            <input type="password" id="admin-password" placeholder="Senha" class="w-full border rounded-xl p-3 text-slate-900 focus:ring-2 focus:ring-blue-500 outline-none">
            <button onclick="makeLogin()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-xl hover:bg-slate-800 transition-all">
              Entrar no Painel
            </button>
          </div>
          <div class="mt-4 text-center text-[13px] text-slate-400">
            &copy; fastPayment <span class="app-version"></span>
          </div>
        </section>

        <section id="step-selection" class="hidden space-y-8">
          <header class="text-center mb-10">
            <h1 class="text-4xl font-black text-slate-900 tracking-tight">Agenda de Eventos <span class="app-version text-[10px] text-gray-400"></span></h1>
            <p class="text-slate-500 mt-2 text-lg">Selecione o evento desejado abaixo</p> 
          </header>
          <div class="flex justify-between items-center">
             <a href="login.html" class="text-slate-400 hover:text-fuchsia-500 text-[11px] font-black uppercase tracking-widest transition-colors">>>> ACESSO ADMIN</a>
          </div>
          <div id="events-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
        </section>

        <section id="step-1" class="hidden max-w-md mx-auto bg-white p-8 rounded-3xl shadow-2xl border border-slate-100 space-y-6">
          <h2 class="text-2xl font-bold text-center text-slate-800">Identificação</h2>
          <div class="space-y-4">
            <input type="text" id="user-name" placeholder="Nome Completo" class="w-full border rounded-xl p-3 text-slate-900 focus:ring-2 focus:ring-blue-500 outline-none">
            <input type="tel" id="user-phone" placeholder="WhatsApp (DDD + Número)" class="w-full border rounded-xl p-3 text-slate-900 focus:ring-2 focus:ring-blue-500 outline-none">
            <input type="email" id="email" placeholder="Seu melhor e-mail" class="w-full border rounded-xl p-3 text-slate-900 focus:ring-2 focus:ring-blue-500 outline-none">
            <button id="btn-send-otp" class="w-full bg-slate-900 text-white font-bold py-4 rounded-xl hover:bg-blue-600 transition-all shadow-lg">
              Validar E-mail e Prosseguir →
            </button>
          </div>
        </section>

        <section id="step-2" class="hidden max-w-md mx-auto bg-white p-8 rounded-3xl shadow-2xl border border-slate-100 space-y-6">
          <h2 class="text-2xl font-bold text-center text-slate-800">Validar Código</h2>
          <div class="space-y-4">
            <input type="text" id="otp-code" maxlength="6" placeholder="000000" class="w-full text-center text-4xl font-black border rounded-xl p-3 text-slate-900 tracking-widest focus:ring-2 focus:ring-blue-500 outline-none">
            <button id="btn-verify-otp" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition-all shadow-lg">
              Verificar Código
            </button>
          </div>
        </section>

      </main>
    </div>

    <div id="modal-crud" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
      <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden">
          <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
              <h3 id="modal-title" class="text-lg font-black text-slate-800 uppercase tracking-tight">Gerenciar</h3>
              <button onclick="closeCrudModal()" class="text-slate-400 hover:text-slate-600 text-2xl">&times;</button>
          </div>
          
          <div class="p-6 space-y-4 text-slate-900">
              <div>
                  <label class="text-[10px] font-bold text-slate-400 ml-1 uppercase">Novo Registro (Nome)</label>
                  <input type="text" id="modal-input-name" class="w-full border rounded-xl p-3 text-sm outline-none focus:ring-2 focus:ring-blue-500" placeholder="Digite o nome...">
              </div>
              <div id="field-price" class="hidden">
                  <label class="text-[10px] font-bold text-slate-400 ml-1 uppercase">Preço (R$)</label>
                  <input type="number" id="modal-input-price" class="w-full border rounded-xl p-3 text-sm outline-none focus:ring-2 focus:ring-blue-500" placeholder="0.00">
              </div>
              <hr class="border-slate-100">
              <div>
                  <label class="text-[10px] font-bold text-slate-400 ml-1 uppercase">Registros Atuais</label>
                  <div class="flex gap-2">
                      <select id="modal-select-list" class="flex-1 border rounded-xl p-3 text-sm outline-none bg-slate-50">
                          <option value="">Carregando...</option>
                      </select>
                      <button onclick="deleteCrudItem()" class="bg-red-50 text-red-600 px-4 rounded-xl hover:bg-red-600 transition-all font-bold text-xs">Excluir</button>
                  </div>
              </div>
          </div>
          <div class="p-6 bg-slate-50 flex gap-3">
              <button onclick="closeCrudModal()" class="flex-1 py-3 text-sm font-bold text-slate-500">Cancelar</button>
              <button onclick="saveCrudItem()" class="flex-1 py-3 text-sm font-bold bg-blue-600 text-white rounded-xl shadow-lg">Adicionar</button>
          </div>
      </div>
    </div>
    
    <button onclick="document.getElementById('modal-crud').classList.add('hidden')" class="text-slate-400 hover:text-slate-600 text-2xl">&times;</button>

    <div id="modal-anamnese" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-2xl rounded-[2.5rem] shadow-2xl overflow-hidden relative">
        <button onclick="document.getElementById('modal-anamnese').classList.add('hidden')" class="absolute top-6 right-6 text-slate-400 hover:text-slate-900 text-3xl z-10">&times;</button>
        
        <div id="content-anamnese" class="p-8">
            </div>
    </div>
</div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
